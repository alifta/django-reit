{% extends "base.html" %}

{% block page_content %}
<h1>{{ listing.title }}</h1>
<div class="row">
    <div class="col-md-8">
        {% if listing.image %}
            <img src="{{ listing.image.url }}" width="100%">
        {% endif %}
    </div>
    <div class="col-md-4">
        <h5>About the listing:</h5>
        <p>{{ listing.description }}</p>
        <br>
        <h5>Price:</h5>
        <p>{{ listing.price }}</p>
    </div>
</div>
{% endblock page_content %}
