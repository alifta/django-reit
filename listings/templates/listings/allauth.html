{% comment %}

{% extends "base.html" %}

{% load socialaccount %}

{% block page_content %}

    <h1>Hello, World! from Home In Block</h1>

    {% if user.is_authenticated %}
        <p>Welcome {{ user.username }} !!!</p>
        <a href="{% url 'logout' %}">Logout</a>
    {% else %}
        <h2>Google Login</h2>
        <a href="{% provider_login_url 'google' %}?next=/">Login with Google</a>
    {% endif %}
    
{% endblock page_content %}

{% endcomment %}
